services:
  - type: web
    name: product-recommender-api
    runtime: node
    plan: free
    region: oregon
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    healthCheckPath: /health
    autoDeployTrigger: commit
    buildFilter:
      paths:
        - backend/**
        - electronics_product.csv
        - render.yaml
    envVars:
      - key: AI_PROVIDER
        value: nvidia
      - key: NVIDIA_API_KEY
        sync: false
      - key: NVIDIA_MODEL
        value: meta/llama-3.1-70b-instruct
      - key: HOST
        value: 0.0.0.0
      - key: NODE_ENV
        value: production
      - key: USD_TO_INR
        value: "83"

  - type: web
    name: product-recommender-web
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    autoDeployTrigger: commit
    buildFilter:
      paths:
        - frontend/**
        - render.yaml
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
